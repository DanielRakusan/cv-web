<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#02020a"/>
  <!-- Terminal window -->
  <rect x="4" y="5" width="24" height="22" rx="4" fill="#0d1117" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="4" y="5" width="24" height="6" rx="4" fill="rgba(74,222,128,0.08)"/>
  <!-- Traffic lights -->
  <circle cx="9"  cy="8" r="1.2" fill="rgba(255,100,100,0.7)"/>
  <circle cx="13" cy="8" r="1.2" fill="rgba(255,200,50,0.7)"/>
  <circle cx="17" cy="8" r="1.2" fill="rgba(74,222,128,0.7)"/>
  <!-- > prompt -->
  <path d="M7 16 L12 19.5 L7 23" stroke="#4ade80" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor -->
  <rect x="14" y="21.5" width="6" height="2.2" rx="1" fill="#22d3ee"/>
