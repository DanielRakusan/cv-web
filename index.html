<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web se připravuje</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,255,255,0.35);
      animation: floatStar linear infinite, pulseStar ease-in-out infinite;
    }

    .star.small {
      width: 1px;
      height: 1px;
      opacity: 0.8;
    }

    .star.big {
      width: 3px;
      height: 3px;
      opacity: 1;
    }

    @keyframes floatStar {
      from {
        transform: translateY(0px);
      }
      to {
        transform: translateY(-120px);
      }
    }

    @keyframes pulseStar {
      0%, 100% {
        opacity: 0.25;
      }
      50% {
        opacity: 1;
      }
    }

    .background-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
      opacity: 0.7;
    }

    .glow {
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(10px);
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 24px;
      left: 24px;
      right: 24px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nameplate {
      display: inline-flex;
      align-items: center;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: #ffffff;
      font-size: 0.95rem;
      letter-spacing: 0.6px;
      backdrop-filter: blur(8px);
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .nameplate.is-link:hover,
    .nameplate.is-link:focus-visible {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
      outline: none;
    }

    .github-popover {
      position: relative;
    }

    .github-popover::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 100%;
      transform: translateX(-50%);
      width: min(420px, calc(100vw - 48px));
      height: 14px;
    }

    .github-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: #ffffff;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .github-icon {
      width: 15px;
      height: 15px;
      display: block;
      fill: currentColor;
      flex-shrink: 0;
    }

    .github-trigger:hover,
    .github-trigger:focus-visible,
    .github-popover.is-open .github-trigger {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
      outline: none;
    }

    .lang-switch {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      padding: 4px;
      backdrop-filter: blur(8px);
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .lang-btn:hover {
      color: #ffffff;
      transform: translateY(-1px);
    }

    .lang-btn.active {
      background: #ffffff;
      color: #050505;
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 24px 24px;
    }

    .panel {
      width: 100%;
      max-width: 980px;
      min-height: 520px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border-radius: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(255,255,255,0.08);
      width: 120px;
      height: 120px;
      pointer-events: none;
    }

    .panel::before {
      top: 18px;
      left: 18px;
      border-right: none;
      border-bottom: none;
    }

    .panel::after {
      bottom: 18px;
      right: 18px;
      border-left: none;
      border-top: none;
    }

    .content {
      text-align: center;
      max-width: 980px;
      width: 100%;
      padding-top: 24px;
    }

    .avatar-shell {
      width: 132px;
      height: 132px;
      margin: 0 auto 28px;
      padding: 6px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.16), rgba(255,255,255,0.04) 65%, rgba(255,255,255,0.02)),
        rgba(255,255,255,0.03);
      box-shadow:
        0 14px 36px rgba(0,0,0,0.35),
        0 0 0 8px rgba(255,255,255,0.02);
    }

    .avatar {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 28px;
      background: rgba(255,255,255,0.03);
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: -2px;
      font-weight: 800;
      margin-bottom: 22px;
      text-transform: uppercase;
      max-width: 980px;
      margin-left: auto;
      margin-right: auto;
      text-wrap: balance;
    }

    .line {
      width: 120px;
      height: 1px;
      background: rgba(255,255,255,0.18);
      margin: 0 auto 26px;
    }

    p {
      color: rgba(255,255,255,0.72);
      font-size: 1.05rem;
      line-height: 1.9;
      max-width: 640px;
      margin: 0 auto;
    }

    .status-box {
      margin-top: 34px;
      display: inline-block;
      padding: 14px 20px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .content-tools {
      position: relative;
      display: flex;
      justify-content: center;
      margin-top: 18px;
      z-index: 4;
    }

    .public-profile {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      width: min(460px, calc(100vw - 48px));
      max-height: min(360px, calc(100svh - 180px));
      margin: 0;
      padding: 24px 22px 22px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      background: rgba(10,10,10,0.9);
      box-shadow: 0 24px 70px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, 4px);
      pointer-events: none;
      overflow-y: auto;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
    }

    .public-heading {
      color: rgba(255,255,255,0.68);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: center;
    }

    .public-bio {
      max-width: 28ch;
      margin: 0 auto 20px;
      text-align: center;
      white-space: pre-line;
      font-size: 1rem;
      line-height: 1.7;
    }

    .public-list {
      display: grid;
      gap: 12px;
    }

    .public-item {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    .public-item:hover {
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.05);
    }

    .public-item-label {
      color: rgba(255,255,255,0.56);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-align: left;
    }

    .public-item-value {
      min-width: 0;
      overflow-wrap: anywhere;
      text-align: right;
      font-weight: 600;
    }

    .github-popover:hover .public-profile,
    .github-popover:focus-within .public-profile,
    .github-popover.is-open .public-profile {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .tiny-corners span {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .tiny-corners span:nth-child(1) { top: 26px; right: 26px; border-left: none; border-bottom: none; }
    .tiny-corners span:nth-child(2) { bottom: 26px; left: 26px; border-right: none; border-top: none; }

    @media (max-height: 820px) {
      .wrap {
        min-height: auto;
        align-items: flex-start;
        padding-top: 112px;
      }

      .panel {
        min-height: auto;
      }

      .content {
        padding-top: 8px;
      }
    }

    @media (max-width: 700px) {
      .topbar {
        top: 14px;
        left: 14px;
        right: 14px;
        flex-direction: row;
        align-items: center;
      }

      .nameplate {
        font-size: 0.82rem;
        padding: 10px 12px;
        max-width: 52vw;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .lang-switch {
        flex-shrink: 0;
      }

      .lang-btn {
        padding: 9px 13px;
        font-size: 0.8rem;
      }

      .github-trigger {
        padding: 9px 12px;
        font-size: 0.72rem;
      }

      .wrap {
        padding: 88px 14px 14px;
        align-items: flex-start;
      }

      .panel {
        min-height: auto;
        padding: 34px 18px;
      }

      .content {
        padding-top: 8px;
      }

      .avatar-shell {
        width: 108px;
        height: 108px;
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(2rem, 12vw, 3.4rem);
        letter-spacing: -1px;
        line-height: 0.96;
      }

      p {
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .badge {
        margin-bottom: 20px;
      }

      .status-box {
        margin-top: 26px;
        font-size: 0.95rem;
        padding: 12px 16px;
      }

      .content-tools {
        margin-top: 16px;
      }

      .public-profile {
        width: min(320px, calc(100vw - 28px));
        max-height: min(55svh, 340px);
        padding: 16px 14px;
        border-radius: 18px;
      }

      .public-heading {
        font-size: 0.74rem;
        margin-bottom: 14px;
      }

      .public-bio {
        margin-bottom: 16px;
      }

      .public-item {
        grid-template-columns: 88px minmax(0, 1fr);
        gap: 12px;
        padding: 12px 14px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="background-grid"></div>
  <div class="glow"></div>

  <header class="topbar">
    <a class="nameplate" id="nameplate">Daniel Rakušan</a>
    <div class="lang-switch" aria-label="Language switcher">
      <button class="lang-btn active" id="btn-cz">CZ</button>
      <button class="lang-btn" id="btn-en">EN</button>
    </div>
  </header>

  <div class="wrap">
    <main class="panel">
      <div class="tiny-corners">
        <span></span>
        <span></span>
      </div>

      <section class="content">
        <div class="avatar-shell">
          <img
            id="avatar"
            class="avatar"
            src="https://github.com/DanielRakusan.png?size=320"
            alt="Profilová fotka Daniela Rakušana z GitHubu"
            width="120"
            height="120"
            loading="eager"
            decoding="async"
            referrerpolicy="no-referrer"
          />
        </div>
        <div class="badge" id="badge">Vítej</div>
        <h1 id="title">Na webu se<br>právě pracuje</h1>
        <div class="line"></div>
        <p id="description">
          Připravuji nový osobní web a portfolio. Brzy tu budou projekty,
          technologie, ukázky práce a stručné informace o mně.
        </p>
        <div class="status-box" id="status">Stránka je momentálně ve vývoji</div>
        <div class="content-tools">
          <div class="github-popover" id="github-popover">
            <button class="github-trigger" id="github-trigger" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="public-profile" hidden>
              <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.5 7.5 0 0 1 8 4.84c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
              </svg>
              <span>GitHub</span>
            </button>
            <section class="public-profile" id="public-profile" role="dialog" aria-label="GitHub" hidden>
              <div class="public-heading" id="public-heading">Veřejné informace z GitHubu</div>
              <p class="public-bio" id="public-bio" hidden></p>
              <div class="public-list" id="public-list"></div>
            </section>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const starsContainer = document.getElementById('stars');
    const starCount = 90;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('span');
      const sizeRoll = Math.random();

      star.classList.add('star');
      if (sizeRoll < 0.6) {
        star.classList.add('small');
      } else if (sizeRoll > 0.9) {
        star.classList.add('big');
      }

      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDuration = (8 + Math.random() * 10) + 's, ' + (2 + Math.random() * 4) + 's';
      star.style.animationDelay = '-' + (Math.random() * 12) + 's, -' + (Math.random() * 5) + 's';

      starsContainer.appendChild(star);
    }

    const translations = {
      cz: {
        lang: 'cs',
        titleTag: 'Web se připravuje',
        badge: 'Vítej',
        title: 'Na webu se<br>právě pracuje',
        description: 'Připravuji nový osobní web a portfolio. Brzy tu budou projekty, technologie, ukázky práce a stručné informace o mně.',
        status: 'Stránka je momentálně ve vývoji',
        publicHeading: 'Veřejné informace z GitHubu',
        avatarAlt: 'Profilová fotka {name} z GitHubu',
        labels: {
          github: 'GitHub',
          location: 'Lokace',
          email: 'E-mail',
          website: 'Web',
          company: 'Firma',
          social: 'Sítě'
        }
      },
      en: {
        lang: 'en',
        titleTag: 'Website in progress',
        badge: 'Welcome',
        title: 'Website<br>in progress',
        description: 'I am preparing a new personal website and portfolio. Soon you will find projects, technologies, work samples and brief information about me here.',
        status: 'The page is currently under development',
        publicHeading: 'Public GitHub details',
        avatarAlt: '{name} GitHub profile photo',
        labels: {
          github: 'GitHub',
          location: 'Location',
          email: 'Email',
          website: 'Website',
          company: 'Company',
          social: 'Social'
        }
      }
    };

    const btnCz = document.getElementById('btn-cz');
    const btnEn = document.getElementById('btn-en');
    const badge = document.getElementById('badge');
    const title = document.getElementById('title');
    const description = document.getElementById('description');
    const status = document.getElementById('status');
    const nameplate = document.getElementById('nameplate');
    const avatar = document.getElementById('avatar');
    const githubPopover = document.getElementById('github-popover');
    const githubTrigger = document.getElementById('github-trigger');
    const publicProfile = document.getElementById('public-profile');
    const publicHeading = document.getElementById('public-heading');
    const publicBio = document.getElementById('public-bio');
    const publicList = document.getElementById('public-list');
    const githubUsername = 'DanielRakusan';
    let currentLanguage = 'cz';
    let currentGithubProfile = null;

    function normalizeUrl(value) {
      if (!value) {
        return '';
      }

      return /^https?:\/\//i.test(value) ? value : 'https://' + value;
    }

    function createPublicItem(label, value, href) {
      const element = href ? document.createElement('a') : document.createElement('div');

      element.className = 'public-item';
      if (href) {
        element.href = href;
        element.target = '_blank';
        element.rel = 'noreferrer';
      }

      const labelElement = document.createElement('span');
      labelElement.className = 'public-item-label';
      labelElement.textContent = label;

      const valueElement = document.createElement('span');
      valueElement.className = 'public-item-value';
      valueElement.textContent = value;

      element.appendChild(labelElement);
      element.appendChild(valueElement);

      return element;
    }

    function setGithubPopoverOpen(isOpen) {
      githubPopover.classList.toggle('is-open', isOpen);
      githubTrigger.setAttribute('aria-expanded', String(isOpen));
    }

    function renderGithubProfile() {
      if (!currentGithubProfile) {
        githubTrigger.hidden = true;
        publicProfile.hidden = true;
        setGithubPopoverOpen(false);
        return;
      }

      const t = translations[currentLanguage];
      const profile = currentGithubProfile;
      const displayName = (profile.name || profile.login || githubUsername).trim();
      const items = [];
      const blogValue = (profile.blog || '').trim();
      const blogUrl = normalizeUrl(blogValue);

      nameplate.textContent = displayName;
      if (profile.email) {
        nameplate.href = 'mailto:' + profile.email;
        nameplate.classList.add('is-link');
        nameplate.title = profile.email;
        nameplate.setAttribute('aria-label', profile.email);
      } else {
        nameplate.removeAttribute('href');
        nameplate.classList.remove('is-link');
        nameplate.removeAttribute('title');
        nameplate.removeAttribute('aria-label');
      }

      avatar.src = profile.avatar_url || avatar.src;
      avatar.alt = t.avatarAlt.replace('{name}', displayName);
      publicHeading.textContent = t.publicHeading;

      publicBio.textContent = (profile.bio || '').trim();
      publicBio.hidden = publicBio.textContent.length === 0;

      items.push(createPublicItem(
        t.labels.github,
        '@' + (profile.login || githubUsername),
        profile.html_url || ('https://github.com/' + githubUsername)
      ));

      if (profile.location) {
        items.push(createPublicItem(t.labels.location, profile.location));
      }

      if (profile.email) {
        items.push(createPublicItem(t.labels.email, profile.email, 'mailto:' + profile.email));
      }

      if (blogUrl) {
        items.push(createPublicItem(t.labels.website, blogValue, blogUrl));
      }

      if (profile.company) {
        items.push(createPublicItem(t.labels.company, profile.company));
      }

      if (profile.twitter_username) {
        items.push(createPublicItem(
          t.labels.social,
          '@' + profile.twitter_username,
          'https://x.com/' + profile.twitter_username
        ));
      }

      publicList.replaceChildren(...items);
      const hasVisibleContent = items.length > 0 || !publicBio.hidden;

      githubTrigger.hidden = !hasVisibleContent;
      publicProfile.hidden = !hasVisibleContent;

      if (!hasVisibleContent) {
        setGithubPopoverOpen(false);
      }
    }

    async function loadGithubProfile() {
      try {
        const response = await fetch('https://api.github.com/users/' + githubUsername, {
          headers: {
            Accept: 'application/vnd.github+json'
          }
        });

        if (!response.ok) {
          return;
        }

        currentGithubProfile = await response.json();
        renderGithubProfile();
      } catch (error) {
        console.error('GitHub profile load failed:', error);
      }
    }

    function setLanguage(language) {
      currentLanguage = language;
      const t = translations[language];
      document.documentElement.lang = t.lang;
      document.title = t.titleTag;
      badge.textContent = t.badge;
      title.innerHTML = t.title;
      description.textContent = t.description;
      status.textContent = t.status;
      renderGithubProfile();

      btnCz.classList.toggle('active', language === 'cz');
      btnEn.classList.toggle('active', language === 'en');

      const newHash = language === 'cz' ? '#/cz' : '#/en';
      window.history.replaceState({}, '', newHash);
    }

    btnCz.addEventListener('click', () => setLanguage('cz'));
    btnEn.addEventListener('click', () => setLanguage('en'));
    githubTrigger.addEventListener('click', () => {
      setGithubPopoverOpen(!githubPopover.classList.contains('is-open'));
    });

    if (window.location.hash.toLowerCase() === '#/en') {
      setLanguage('en');
    } else {
      setLanguage('cz');
    }

    window.addEventListener('hashchange', () => {
      if (window.location.hash.toLowerCase() === '#/en') {
        setLanguage('en');
      } else {
        setLanguage('cz');
      }
    });

    document.addEventListener('click', (event) => {
      if (!githubPopover.contains(event.target)) {
        setGithubPopoverOpen(false);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setGithubPopoverOpen(false);
        githubTrigger.blur();
      }
    });

    loadGithubProfile();
  </script>
</body>
</html>
