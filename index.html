<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web se připravuje</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #ffffff;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,255,255,0.35);
      animation: floatStar linear infinite, pulseStar ease-in-out infinite;
    }

    .star.small {
      width: 1px;
      height: 1px;
      opacity: 0.8;
    }

    .star.big {
      width: 3px;
      height: 3px;
      opacity: 1;
    }

    @keyframes floatStar {
      from {
        transform: translateY(0px);
      }
      to {
        transform: translateY(-120px);
      }
    }

    @keyframes pulseStar {
      0%, 100% {
        opacity: 0.25;
      }
      50% {
        opacity: 1;
      }
    }

    .background-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
      opacity: 0.7;
    }

    .glow {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(10px);
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 24px;
      left: 24px;
      right: 24px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nameplate {
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: #ffffff;
      font-size: 0.95rem;
      letter-spacing: 0.6px;
      backdrop-filter: blur(8px);
    }

    .lang-switch {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      padding: 4px;
      backdrop-filter: blur(8px);
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .lang-btn:hover {
      color: #ffffff;
      transform: translateY(-1px);
    }

    .lang-btn.active {
      background: #ffffff;
      color: #050505;
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .panel {
      width: 100%;
      max-width: 980px;
      min-height: 520px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border-radius: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(255,255,255,0.08);
      width: 120px;
      height: 120px;
      pointer-events: none;
    }

    .panel::before {
      top: 18px;
      left: 18px;
      border-right: none;
      border-bottom: none;
    }

    .panel::after {
      bottom: 18px;
      right: 18px;
      border-left: none;
      border-top: none;
    }

    .content {
      text-align: center;
      max-width: 760px;
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 28px;
      background: rgba(255,255,255,0.03);
    }

    h1 {
      font-size: clamp(2.6rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: -2px;
      font-weight: 800;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .line {
      width: 120px;
      height: 1px;
      background: rgba(255,255,255,0.18);
      margin: 0 auto 26px;
    }

    p {
      color: rgba(255,255,255,0.72);
      font-size: 1.05rem;
      line-height: 1.9;
      max-width: 640px;
      margin: 0 auto;
    }

    .status-box {
      margin-top: 34px;
      display: inline-block;
      padding: 14px 20px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .tiny-corners span {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .tiny-corners span:nth-child(1) { top: 26px; right: 26px; border-left: none; border-bottom: none; }
    .tiny-corners span:nth-child(2) { bottom: 26px; left: 26px; border-right: none; border-top: none; }

    @media (max-width: 700px) {
      .topbar {
        top: 16px;
        left: 16px;
        right: 16px;
        flex-direction: column;
        align-items: stretch;
      }

      .nameplate,
      .lang-switch {
        align-self: center;
      }

      .panel {
        min-height: auto;
        padding: 36px 24px;
      }

      h1 {
        letter-spacing: -1px;
      }

      p {
        font-size: 0.98rem;
        line-height: 1.75;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="background-grid"></div>
  <div class="glow"></div>

  <header class="topbar">
    <div class="nameplate">Daniel Rakušan</div>
    <div class="lang-switch" aria-label="Language switcher">
      <button class="lang-btn active" id="btn-cz">CZ</button>
      <button class="lang-btn" id="btn-en">EN</button>
    </div>
  </header>

  <div class="wrap">
    <main class="panel">
      <div class="tiny-corners">
        <span></span>
        <span></span>
      </div>

      <section class="content">
        <div class="badge" id="badge">Vítej</div>
        <h1 id="title">Na webu se<br>právě pracuje</h1>
        <div class="line"></div>
        <p id="description">
          Připravuji nový osobní web a portfolio. Brzy tu budou projekty,
          technologie, ukázky práce a stručné informace o mně.
        </p>
        <div class="status-box" id="status">Stránka je momentálně ve vývoji</div>
      </section>
    </main>
  </div>

  <script>
    const starsContainer = document.getElementById('stars');
    const starCount = 90;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('span');
      const sizeRoll = Math.random();

      star.classList.add('star');
      if (sizeRoll < 0.6) {
        star.classList.add('small');
      } else if (sizeRoll > 0.9) {
        star.classList.add('big');
      }

      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDuration = (8 + Math.random() * 10) + 's, ' + (2 + Math.random() * 4) + 's';
      star.style.animationDelay = '-' + (Math.random() * 12) + 's, -' + (Math.random() * 5) + 's';

      starsContainer.appendChild(star);
    }

    const translations = {
      cz: {
        lang: 'cs',
        titleTag: 'Web se připravuje',
        badge: 'Vítej',
        title: 'Na webu se<br>právě pracuje',
        description: 'Připravuji nový osobní web a portfolio. Brzy tu budou projekty, technologie, ukázky práce a stručné informace o mně.',
        status: 'Stránka je momentálně ve vývoji'
      },
      en: {
        lang: 'en',
        titleTag: 'Website in progress',
        badge: 'Welcome',
        title: 'The website is<br>currently being built',
        description: 'I am preparing a new personal website and portfolio. Soon you will find projects, technologies, work samples and brief information about me here.',
        status: 'The page is currently under development'
      }
    };

    const btnCz = document.getElementById('btn-cz');
    const btnEn = document.getElementById('btn-en');
    const badge = document.getElementById('badge');
    const title = document.getElementById('title');
    const description = document.getElementById('description');
    const status = document.getElementById('status');

    function setLanguage(language) {
      const t = translations[language];
      document.documentElement.lang = t.lang;
      document.title = t.titleTag;
      badge.textContent = t.badge;
      title.innerHTML = t.title;
      description.textContent = t.description;
      status.textContent = t.status;

      btnCz.classList.toggle('active', language === 'cz');
      btnEn.classList.toggle('active', language === 'en');

      const newPath = language === 'cz' ? '/cz' : '/en';
      window.history.replaceState({}, '', newPath);
    }

    btnCz.addEventListener('click', () => setLanguage('cz'));
    btnEn.addEventListener('click', () => setLanguage('en'));

    if (window.location.pathname.toLowerCase().endsWith('/en')) {
      setLanguage('en');
    } else {
      setLanguage('cz');
    }
  </script>
</body>
</html>
